name: Build WebRTC

on:
    workflow_dispatch:
        inputs:
            webrtc_branch:
                description: "webrtc-sdk/webrtc branch to build"
                required: true
                default: "m144_release"
                type: choice
                options:
                    - m146_release
                    - m144_release
                    - m137_release
                    - m125_release
            build_type:
                description: "Build type (controls is_debug and enable_dsyms)"
                required: true
                default: "release"
                type: choice
                options:
                    - release
                    - debug
            commit:
                description: "webrtc-sdk/webrtc commit hash (overrides branch when set)"
                required: false
                default: ""
            release_tag:
                description: "Release tag (e.g., m144.7559.03)"
                required: true
                default: "m144.7559.03"

permissions:
    contents: write

jobs:
    build-macos-arm64:
        runs-on: macos-14
        timeout-minutes: 120
        defaults:
            run:
                working-directory: ./webrtc-build/build

        steps:
            - uses: actions/checkout@v4

            - name: Show build environment
              working-directory: .
              run: |
                  xcodebuild -version
                  xcrun --show-sdk-path
                  sw_vers
                  uname -m

            - name: Free disk space
              working-directory: .
              run: |
                  echo "=== Disk space before cleanup ==="
                  df -h /
                  sudo rm -rf /Users/runner/Library/Android
                  sudo rm -rf /Users/runner/.dotnet
                  sudo rm -rf /Users/runner/hostedtoolcache
                  echo "=== Disk space after cleanup ==="
                  df -h /

            - name: Clone webrtc-sdk/webrtc-build
              working-directory: .
              run: |
                  git clone --depth 1 https://github.com/webrtc-sdk/webrtc-build.git

            - name: Fetch, patch & configure
              run: |
                  CHECKOUT_REF="${{ inputs.commit }}"
                  if [ -z "$CHECKOUT_REF" ]; then
                    CHECKOUT_REF="${{ inputs.webrtc_branch }}"
                  fi
                  echo "Using ref: $CHECKOUT_REF"
                  python3 run.py build macos_arm64 \
                    --commit "$CHECKOUT_REF" \
                    --webrtc-fetch \
                    --webrtc-nobuild

            - name: Set debug GN args
              if: inputs.build_type == 'debug'
              run: |
                  ARGS_GN="$PWD/_build/macos_arm64/release/webrtc/args.gn"
                  echo "" >> "$ARGS_GN"
                  echo "is_debug = true" >> "$ARGS_GN"
                  echo "enable_dsyms = true" >> "$ARGS_GN"
                  echo "Updated args.gn:"
                  cat "$ARGS_GN"

            - name: Disable custom libc++ and regenerate build files
              run: |
                  ARGS_GN="$PWD/_build/macos_arm64/release/webrtc/args.gn"
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"
                  SRC_DIR="$PWD/_source/macos_arm64/webrtc/src"
                  export PATH="$PWD/_source/macos_arm64/depot_tools:$PATH"
                  export PATH="$SRC_DIR/buildtools/mac:$PATH"

                  if ! grep -q "use_custom_libcxx" "$ARGS_GN"; then
                    echo "" >> "$ARGS_GN"
                    echo "use_custom_libcxx=false" >> "$ARGS_GN"
                    echo "Injected use_custom_libcxx=false into args.gn"
                  fi
                  echo "=== args.gn ==="
                  cat "$ARGS_GN"

                  cd "$SRC_DIR"
                  gn gen "$BUILD_DIR"

            - name: Build WebRTC
              run: |
                  export PATH="$PWD/_source/macos_arm64/depot_tools:$PATH"
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"

                  autoninja -C "$BUILD_DIR" \
                    api/audio_codecs:builtin_audio_decoder_factory \
                    api/task_queue:default_task_queue_factory \
                    sdk:native_api \
                    sdk:default_codec_factory_objc \
                    pc:peer_connection \
                    sdk:videocapture_objc \
                    sdk:mac_framework_objc

            - name: Create libwebrtc.a
              run: |
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"
                  cd "$BUILD_DIR/obj"
                  OBJECTS=$(find . -name '*.o' -not -path './third_party/nasm/*')
                  echo "Found $(echo "$OBJECTS" | wc -l) object files"
                  /usr/bin/ar -rc "$BUILD_DIR/libwebrtc.a" $OBJECTS
                  echo "libwebrtc.a size: $(du -h "$BUILD_DIR/libwebrtc.a" | cut -f1)"

            - name: Verify ABI compatibility
              run: |
                  LIB="$PWD/_build/macos_arm64/release/webrtc/libwebrtc.a"
                  echo "=== Checking for Chromium libc++ symbols ==="
                  CR_COUNT=$(nm "$LIB" 2>/dev/null | grep -c '__Cr' || true)
                  STD1_COUNT=$(nm "$LIB" 2>/dev/null | grep -c '__1' || true)
                  echo "__Cr symbols (Chromium libc++): $CR_COUNT"
                  echo "__1 symbols (system libc++):    $STD1_COUNT"

                  if [ "$CR_COUNT" -gt 0 ]; then
                    echo "::warning::Found $CR_COUNT Chromium libc++ (__Cr) symbols — may cause ABI issues"
                  else
                    echo "Clean build — no Chromium libc++ symbols!"
                  fi

            - name: Package for vcpkg
              run: |
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"
                  SRC_DIR="$PWD/_source/macos_arm64/webrtc/src"

                  mkdir -p /tmp/package/{include,lib}
                  cp "$BUILD_DIR/libwebrtc.a" /tmp/package/lib/

                  # Copy headers
                  rsync -amv \
                    --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
                    "$SRC_DIR/." /tmp/package/include/.

                  echo "${{ inputs.release_tag }}" > /tmp/package/VERSION

                  # Generate WebRTCConfig.cmake for Qt6 integration
                  {
                    printf '# WebRTCConfig.cmake\n'
                    printf 'if(NOT TARGET WebRTC::WebRTC)\n'
                    printf '  add_library(WebRTC::WebRTC STATIC IMPORTED)\n'
                    printf '  set_target_properties(WebRTC::WebRTC PROPERTIES\n'
                    printf '    IMPORTED_LOCATION "${CMAKE_CURRENT_LIST_DIR}/lib/libwebrtc.a"\n'
                    printf '    INTERFACE_INCLUDE_DIRECTORIES "${CMAKE_CURRENT_LIST_DIR}/include"\n'
                    printf '    INTERFACE_COMPILE_DEFINITIONS "WEBRTC_MAC;WEBRTC_POSIX"\n'
                    printf '  )\n'
                    printf '  # macOS frameworks required by WebRTC\n'
                    printf '  foreach(fw Foundation AVFoundation CoreAudio CoreMedia CoreVideo\n'
                    printf '             AudioToolbox VideoToolbox CoreGraphics IOSurface Metal\n'
                    printf '             AppKit ScreenCaptureKit CoreFoundation CoreServices)\n'
                    printf '    find_library(${fw}_LIB ${fw})\n'
                    printf '    if(${fw}_LIB)\n'
                    printf '      list(APPEND _webrtc_frameworks ${${fw}_LIB})\n'
                    printf '    endif()\n'
                    printf '  endforeach()\n'
                    printf '  set_property(TARGET WebRTC::WebRTC APPEND PROPERTY\n'
                    printf '    INTERFACE_LINK_LIBRARIES ${_webrtc_frameworks}\n'
                    printf '  )\n'
                    printf 'endif()\n'
                  } > /tmp/package/WebRTCConfig.cmake

                  cd /tmp/package
                  tar -Jcf /tmp/libwebrtc-macos-arm64.tar.xz include lib VERSION WebRTCConfig.cmake
                  echo "=== Package size ==="
                  ls -lh /tmp/libwebrtc-macos-arm64.tar.xz

              # Move artifact to workspace root for upload
            - name: Copy artifact
              working-directory: .
              run: cp /tmp/libwebrtc-macos-arm64.tar.xz .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: libwebrtc-macos-arm64
                  path: libwebrtc-macos-arm64.tar.xz

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.release_tag }}
                  name: "WebRTC ${{ inputs.release_tag }}"
                  body: |
                      WebRTC `${{ inputs.release_tag }}` built from [webrtc-sdk/webrtc](https://github.com/webrtc-sdk/webrtc).

                      - **Branch:** `${{ inputs.webrtc_branch }}`
                      - **Commit:** `${{ inputs.commit != '' && inputs.commit || '(branch tip)' }}`
                      - **Build type:** `${{ inputs.build_type }}`
                      - **Platform:** macOS arm64 (Apple Silicon)
                      - **ABI:** `std::__1::` (Apple system libc++, compatible with Qt6)

                      ## Qt6 CMake Integration

                      Extract the tarball, then in your `CMakeLists.txt`:

                      ```cmake
                      set(WebRTC_DIR "/path/to/webrtc-macos-arm64")
                      find_package(WebRTC REQUIRED PATHS ${WebRTC_DIR} NO_DEFAULT_PATH)
                      target_link_libraries(your_app PRIVATE WebRTC::WebRTC)
                      ```

                      The included `WebRTCConfig.cmake` automatically links all required macOS frameworks (Foundation, AVFoundation, CoreAudio, CoreMedia, CoreVideo, AudioToolbox, VideoToolbox, CoreGraphics, IOSurface, Metal, AppKit, ScreenCaptureKit, CoreFoundation, CoreServices).
                  files: libwebrtc-macos-arm64.tar.xz
