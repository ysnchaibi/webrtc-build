name: Build WebRTC

on:
    workflow_dispatch:
        inputs:
            commit:
                description: "webrtc-sdk/webrtc commit hash (from VERSION or custom)"
                required: true
                default: "770e5461892d7d1aaff7ff886ab1fc7c5cd77bd1"
            release_tag:
                description: "Release tag (e.g., m144.7559.03)"
                required: true
                default: "m144.7559.03"

permissions:
    contents: write

jobs:
    build-macos-arm64:
        runs-on: macos-14
        timeout-minutes: 120
        defaults:
            run:
                working-directory: ./webrtc-build/build

        steps:
            - uses: actions/checkout@v4

            - name: Show build environment
              working-directory: .
              run: |
                  xcodebuild -version
                  xcrun --show-sdk-path
                  sw_vers
                  uname -m

            - name: Free disk space
              working-directory: .
              run: |
                  echo "=== Disk space before cleanup ==="
                  df -h /
                  sudo rm -rf /Users/runner/Library/Android
                  sudo rm -rf /Users/runner/.dotnet
                  sudo rm -rf /Users/runner/hostedtoolcache
                  echo "=== Disk space after cleanup ==="
                  df -h /

            - name: Clone webrtc-sdk/webrtc-build
              working-directory: .
              run: |
                  git clone --depth 1 https://github.com/webrtc-sdk/webrtc-build.git

            - name: Fetch, patch & configure
              run: |
                  python3 run.py build macos_arm64 \
                    --commit "${{ inputs.commit }}" \
                    --webrtc-fetch \
                    --webrtc-nobuild

            - name: Create missing SDK modulemaps
              run: |
                  SDK_PATH=$(xcrun --show-sdk-path)
                  echo "SDK: $SDK_PATH"

                  # WebRTC m144 libc++ module compilation references modulemaps
                  # from Google's hermetic SDK that don't exist in public macOS SDKs.
                  # Create empty stubs so the .pcm compilation succeeds.
                  # (use_custom_libcxx=false means the actual libc++ comes from
                  # the system — these stubs don't affect the final binary.)
                  for mod in DarwinBasic DarwinFoundation1 DarwinFoundation2 DarwinFoundation3; do
                    mapfile="$SDK_PATH/usr/include/$mod.modulemap"
                    if [ ! -f "$mapfile" ]; then
                      echo "Creating stub: $mapfile"
                      printf 'module %s [system] {\n}\n' "$mod" | sudo tee "$mapfile" > /dev/null
                    else
                      echo "Already exists: $mapfile"
                    fi
                  done

            - name: Build WebRTC
              run: |
                  export PATH="$PWD/_source/macos_arm64/depot_tools:$PATH"
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"

                  autoninja -C "$BUILD_DIR" \
                    api/audio_codecs:builtin_audio_decoder_factory \
                    api/task_queue:default_task_queue_factory \
                    sdk:native_api \
                    sdk:default_codec_factory_objc \
                    pc:peer_connection \
                    sdk:videocapture_objc \
                    sdk:mac_framework_objc

            - name: Create libwebrtc.a
              run: |
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"
                  cd "$BUILD_DIR/obj"
                  OBJECTS=$(find . -name '*.o' -not -path './third_party/nasm/*')
                  echo "Found $(echo "$OBJECTS" | wc -l) object files"
                  /usr/bin/ar -rc "$BUILD_DIR/libwebrtc.a" $OBJECTS
                  echo "libwebrtc.a size: $(du -h "$BUILD_DIR/libwebrtc.a" | cut -f1)"

            - name: Verify ABI compatibility
              run: |
                  LIB="$PWD/_build/macos_arm64/release/webrtc/libwebrtc.a"
                  echo "=== Checking for Chromium libc++ symbols ==="
                  CR_COUNT=$(nm "$LIB" 2>/dev/null | grep -c '__Cr' || true)
                  STD1_COUNT=$(nm "$LIB" 2>/dev/null | grep -c '__1' || true)
                  echo "__Cr symbols (Chromium libc++): $CR_COUNT"
                  echo "__1 symbols (system libc++):    $STD1_COUNT"

                  if [ "$CR_COUNT" -gt 0 ]; then
                    echo "::warning::Found $CR_COUNT Chromium libc++ (__Cr) symbols — may cause ABI issues"
                  else
                    echo "Clean build — no Chromium libc++ symbols!"
                  fi

            - name: Package for vcpkg
              run: |
                  BUILD_DIR="$PWD/_build/macos_arm64/release/webrtc"
                  SRC_DIR="$PWD/_source/macos_arm64/webrtc/src"

                  mkdir -p /tmp/package/{include,lib}
                  cp "$BUILD_DIR/libwebrtc.a" /tmp/package/lib/

                  # Copy headers
                  rsync -amv \
                    --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
                    "$SRC_DIR/." /tmp/package/include/.

                  echo "${{ inputs.release_tag }}" > /tmp/package/VERSION

                  cd /tmp/package
                  tar -Jcf /tmp/libwebrtc-macos-arm64.tar.xz include lib VERSION
                  echo "=== Package size ==="
                  ls -lh /tmp/libwebrtc-macos-arm64.tar.xz

              # Move artifact to workspace root for upload
            - name: Copy artifact
              working-directory: .
              run: cp /tmp/libwebrtc-macos-arm64.tar.xz .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: libwebrtc-macos-arm64
                  path: libwebrtc-macos-arm64.tar.xz

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.release_tag }}
                  name: "WebRTC ${{ inputs.release_tag }}"
                  body: |
                      WebRTC `${{ inputs.release_tag }}` built from [webrtc-sdk/webrtc](https://github.com/webrtc-sdk/webrtc) with `use_custom_libcxx=false` (system libc++).

                      - Source: `webrtc-sdk/webrtc`
                      - Commit: `${{ inputs.commit }}`
                      - Platform: macOS arm64
                      - ABI: `std::__1::` (Apple system libc++)
                  files: libwebrtc-macos-arm64.tar.xz
